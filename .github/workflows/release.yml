name: Build Installers

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - 'v*'

jobs:
  build-win:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Download ffmpeg for Windows
        shell: pwsh
        run: |
          $url = "https://github.com/GyanD/codexffmpeg/releases/download/7.1.1/ffmpeg-7.1.1-essentials_build.zip"
          $zip = "$env:TEMP\ffmpeg.zip"
          Invoke-WebRequest -Uri $url -OutFile $zip
          Expand-Archive -Path $zip -DestinationPath "$env:TEMP\ffmpeg-extract" -Force
          $ffmpegExe = Get-ChildItem -Path "$env:TEMP\ffmpeg-extract" -Filter "ffmpeg.exe" -Recurse | Select-Object -First 1
          New-Item -ItemType Directory -Force -Path "resources\ffmpeg"
          Copy-Item $ffmpegExe.FullName -Destination "resources\ffmpeg\ffmpeg.exe"
          Write-Host "ffmpeg bundled: $(Get-Item resources\ffmpeg\ffmpeg.exe | Select-Object -ExpandProperty Length) bytes"

      - name: Checkout upforge-trainer
        uses: actions/checkout@v4
        with:
          repository: LRAFam/upforge-trainer
          path: upforge-trainer
          token: ${{ secrets.GH_TOKEN }}

      - name: Install Godot 4 + export templates
        shell: pwsh
        run: |
          $godotVersion = "4.4.1"
          $godotZip = "$env:TEMP\godot.zip"
          $templatesZip = "$env:TEMP\godot-templates.tpz"

          # Download Godot headless (console binary)
          Invoke-WebRequest -Uri "https://github.com/godotengine/godot/releases/download/$godotVersion-stable/Godot_v$($godotVersion)-stable_win64.exe.zip" -OutFile $godotZip
          Expand-Archive -Path $godotZip -DestinationPath "$env:TEMP\godot" -Force
          $godotExe = Get-ChildItem "$env:TEMP\godot" -Filter "*.exe" | Select-Object -First 1 -ExpandProperty FullName
          Copy-Item $godotExe "$env:TEMP\godot\godot.exe" -Force
          echo "GODOT=$env:TEMP\godot\godot.exe" >> $env:GITHUB_ENV

          # Download export templates
          Invoke-WebRequest -Uri "https://github.com/godotengine/godot/releases/download/$godotVersion-stable/Godot_v$($godotVersion)-stable_export_templates.tpz" -OutFile $templatesZip
          $templateDir = "$env:APPDATA\Godot\export_templates\$godotVersion.stable"
          New-Item -ItemType Directory -Force -Path $templateDir
          # .tpz is a renamed .zip
          Expand-Archive -Path $templatesZip -DestinationPath "$env:TEMP\godot-templates" -Force
          Get-ChildItem "$env:TEMP\godot-templates\templates" | Copy-Item -Destination $templateDir -Recurse

      - name: Export Godot trainer for Windows
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "resources\trainer"
          $projectPath = "${{ github.workspace }}\upforge-trainer"
          $outputPath  = "${{ github.workspace }}\resources\trainer\upforge-trainer.exe"
          # --headless export
          & "$env:GODOT" --headless --path $projectPath --export-release "Windows Desktop" $outputPath
          if (!(Test-Path $outputPath)) { throw "Godot export failed — binary not found at $outputPath" }
          Write-Host "Trainer binary: $(Get-Item $outputPath | Select-Object -ExpandProperty Length) bytes"

      - name: Rebuild native modules for Electron
        run: npx electron-rebuild -f -w keytar
        env:
          npm_config_msvs_version: "2022"

      - name: Build & publish Windows release (on tag)
        if: startsWith(github.ref, 'refs/tags/v')
        run: npm run build && npx electron-builder --win --publish always
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}

      - name: Build Windows installer (dev artifact)
        if: "!startsWith(github.ref, 'refs/tags/v')"
        run: npm run build && npx electron-builder --win --publish never

      - name: Upload Windows artifact
        if: "!startsWith(github.ref, 'refs/tags/v')"
        uses: actions/upload-artifact@v4
        with:
          name: UpForge-Windows
          path: dist/*.exe
          retention-days: 30

  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Download ffmpeg for macOS
        run: |
          brew install ffmpeg
          mkdir -p resources/ffmpeg
          cp "$(which ffmpeg)" resources/ffmpeg/ffmpeg
          echo "ffmpeg bundled: $(wc -c < resources/ffmpeg/ffmpeg) bytes"

      - name: Build & publish Mac release (on tag)
        if: startsWith(github.ref, 'refs/tags/v')
        run: npm run build && npx electron-builder --mac --publish always
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}

      - name: Build Mac installer (dev artifact)
        if: "!startsWith(github.ref, 'refs/tags/v')"
        run: npm run build && npx electron-builder --mac --publish never

      - name: Upload Mac artifact
        if: "!startsWith(github.ref, 'refs/tags/v')"
        uses: actions/upload-artifact@v4
        with:
          name: UpForge-Mac
          path: dist/*.dmg
          retention-days: 30
