name: Build Installers

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - 'v*'

jobs:
  build-win:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Download ffmpeg for Windows
        shell: pwsh
        run: |
          $url = "https://github.com/GyanD/codexffmpeg/releases/download/7.1.1/ffmpeg-7.1.1-essentials_build.zip"
          $zip = "$env:TEMP\ffmpeg.zip"
          Invoke-WebRequest -Uri $url -OutFile $zip
          Expand-Archive -Path $zip -DestinationPath "$env:TEMP\ffmpeg-extract" -Force
          $ffmpegExe = Get-ChildItem -Path "$env:TEMP\ffmpeg-extract" -Filter "ffmpeg.exe" -Recurse | Select-Object -First 1
          New-Item -ItemType Directory -Force -Path "resources\ffmpeg"
          Copy-Item $ffmpegExe.FullName -Destination "resources\ffmpeg\ffmpeg.exe"
          Write-Host "ffmpeg bundled: $(Get-Item resources\ffmpeg\ffmpeg.exe | Select-Object -ExpandProperty Length) bytes"

      - name: Download Godot trainer binary
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          New-Item -ItemType Directory -Force -Path "resources\trainer"
          $trainerPath = "resources\trainer\upforge-trainer.exe"
          $downloaded = $false
          for ($attempt = 1; $attempt -le 5; $attempt++) {
            Remove-Item $trainerPath -Force -ErrorAction SilentlyContinue
            gh release download --repo LRAFam/upforge-trainer --pattern "upforge-trainer.exe" --dir "resources\trainer"
            if ($LASTEXITCODE -eq 0 -and (Test-Path $trainerPath)) {
              $downloaded = $true
              break
            }
            if ($attempt -lt 5) {
              $delay = 10 * $attempt
              Write-Warning "Trainer download failed (attempt $attempt/5). Retrying in $delay seconds..."
              Start-Sleep -Seconds $delay
            }
          }
          if (-not $downloaded) { throw "Trainer download failed after 5 attempts" }
          $size = (Get-Item "resources\trainer\upforge-trainer.exe").Length
          Write-Host "Trainer binary downloaded: $size bytes"
          if ($size -lt 1MB) { throw "Trainer binary too small — download likely failed" }

      - name: Rebuild native modules for Electron
        run: npx electron-rebuild -f -w keytar
        env:
          npm_config_msvs_version: "2022"

      - name: Build Windows installer (tag — publish in publish-release job)
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          VITE_ERROR_REPORTING_KEY: ${{ secrets.ERROR_REPORTING_KEY }}
        run: npm run build && npx electron-builder --win --publish never

      - name: Build Windows installer (dev artifact)
        if: "!startsWith(github.ref, 'refs/tags/v')"
        env:
          VITE_ERROR_REPORTING_KEY: ${{ secrets.ERROR_REPORTING_KEY }}
        run: npm run build && npx electron-builder --win --publish never

      - name: Upload Windows release artifacts
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v4
        with:
          name: UpForge-Windows
          path: |
            dist/latest.yml
            dist/*.exe
            dist/*.exe.blockmap
          retention-days: 7

      - name: Upload Windows dev artifact
        if: "!startsWith(github.ref, 'refs/tags/v')"
        uses: actions/upload-artifact@v4
        with:
          name: UpForge-Windows
          path: dist/*.exe
          retention-days: 30

  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Download ffmpeg for macOS
        run: |
          brew install ffmpeg
          mkdir -p resources/ffmpeg
          cp "$(which ffmpeg)" resources/ffmpeg/ffmpeg
          echo "ffmpeg bundled: $(wc -c < resources/ffmpeg/ffmpeg) bytes"

      - name: Build Mac installer (tag — publish in publish-release job)
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          VITE_ERROR_REPORTING_KEY: ${{ secrets.ERROR_REPORTING_KEY }}
        run: npm run build && npx electron-builder --mac --publish never

      - name: Build Mac installer (dev artifact)
        if: "!startsWith(github.ref, 'refs/tags/v')"
        env:
          VITE_ERROR_REPORTING_KEY: ${{ secrets.ERROR_REPORTING_KEY }}
        run: npm run build && npx electron-builder --mac --publish never

      - name: Upload Mac release artifacts
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v4
        with:
          name: UpForge-Mac
          path: |
            dist/latest-mac.yml
            dist/*.dmg
            dist/*.dmg.blockmap
          retention-days: 7

      - name: Upload Mac dev artifact
        if: "!startsWith(github.ref, 'refs/tags/v')"
        uses: actions/upload-artifact@v4
        with:
          name: UpForge-Mac
          path: dist/*.dmg
          retention-days: 30

  # Single publish step: upload latest.yml BEFORE installers so auto-updater never 404s.
  publish-release:
    needs: [build-win, build-mac]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: UpForge-*
          merge-multiple: true
          path: dist

      - name: Publish GitHub release (metadata first)
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          test -f dist/latest.yml || (echo "missing dist/latest.yml" && exit 1)
          test -f dist/latest-mac.yml || (echo "missing dist/latest-mac.yml" && exit 1)

          # latest.yml path must match the Windows installer filename on the release
          EXPECTED_EXE=$(grep '^path:' dist/latest.yml | awk '{print $2}')
          ACTUAL_EXE=$(ls -1 dist/*.exe 2>/dev/null | head -1 || true)
          if [ -z "$EXPECTED_EXE" ] || [ -z "$ACTUAL_EXE" ]; then
            echo "Missing installer or latest.yml path"
            ls -la dist/
            exit 1
          fi
          if [ "$(basename "$ACTUAL_EXE")" != "$EXPECTED_EXE" ]; then
            echo "Aligning installer name: $(basename "$ACTUAL_EXE") -> $EXPECTED_EXE"
            cp -f "$ACTUAL_EXE" "dist/$EXPECTED_EXE"
          fi
          test -f "dist/$EXPECTED_EXE" || (echo "Expected installer not found: $EXPECTED_EXE" && exit 1)

          if ! gh release view "$TAG" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            gh release create "$TAG" --repo "${{ github.repository }}" --title "$VERSION" --notes "See commit history for changes."
          fi

          echo "Uploading auto-update metadata first…"
          gh release upload "$TAG" --repo "${{ github.repository }}" dist/latest.yml dist/latest-mac.yml --clobber

          echo "Uploading installers…"
          gh release upload "$TAG" --repo "${{ github.repository }}" \
            "dist/${EXPECTED_EXE}" dist/*.exe.blockmap dist/*.dmg dist/*.dmg.blockmap --clobber

          echo "Verifying latest.yml is downloadable…"
          for i in $(seq 1 12); do
            if curl -sfL "https://github.com/${{ github.repository }}/releases/download/${TAG}/latest.yml" >/dev/null; then
              echo "latest.yml is live"
              exit 0
            fi
            echo "Waiting for CDN… ($i/12)"
            sleep 5
          done
          echo "WARNING: latest.yml not yet reachable after upload"
