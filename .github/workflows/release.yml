name: Build Installers

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - 'v*'

jobs:
  build-win:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Rebuild native modules for Electron
        run: npx electron-rebuild -f -w keytar
        env:
          npm_config_msvs_version: "2022"

      - name: Build & publish Windows release (on tag)
        if: startsWith(github.ref, 'refs/tags/v')
        run: npm run build && npx electron-builder --win --publish always
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}

      - name: Build Windows installer (dev artifact)
        if: "!startsWith(github.ref, 'refs/tags/v')"
        run: npm run build && npx electron-builder --win --publish never

      - name: Upload Windows artifact
        if: "!startsWith(github.ref, 'refs/tags/v')"
        uses: actions/upload-artifact@v4
        with:
          name: UpForge-Windows
          path: dist/*.exe
          retention-days: 30

  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build & publish Mac release (on tag)
        if: startsWith(github.ref, 'refs/tags/v')
        run: npm run build && npx electron-builder --mac --publish always
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}

      - name: Build Mac installer (dev artifact)
        if: "!startsWith(github.ref, 'refs/tags/v')"
        run: npm run build && npx electron-builder --mac --publish never

      - name: Upload Mac artifact
        if: "!startsWith(github.ref, 'refs/tags/v')"
        uses: actions/upload-artifact@v4
        with:
          name: UpForge-Mac
          path: dist/*.dmg
          retention-days: 30
